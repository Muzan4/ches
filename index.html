<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Meowster </title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="cheslook.css">
</head>
<body>

    <div class="app-container">
        <h1>Chess Meowster </h1>
        
        <div id="menu" class="menu-container">
            <h2>Select Game Mode</h2>
            <button id="btn-local" class="menu-btn">Local Play (Pass & Play)</button>
            <button id="btn-ai" class="menu-btn AI-btn">vs Computer AI</button>
        </div>

        <div id="game-screen" class="game-wrapper">
            <div id="board" class="game-container"></div>
            <div id="status" class="status-bar">Select a mode to begin</div>
            <button id="btn-back" class="back-btn">‹ Main Menu</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    
    <script src="ches.js"></script>
</body>
</html>
